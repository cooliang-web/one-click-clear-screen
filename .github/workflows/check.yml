name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate extension files
        run: node scripts/check-extension.js
